<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Receipt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">

<h2>🎫 Booking Receipt</h2>

<p><b>Booking ID:</b> <span id="bookingId"></span></p>

<p><b>Name:</b> <span id="rName"></span></p>

<p><b>Email:</b> <span id="rEmail"></span></p>

<p><b>Hotel:</b> <span id="rHotel"></span></p>

<p><b>Check-in:</b> <span id="rCheckin"></span></p>

<p><b>Check-out:</b> <span id="rCheckout"></span></p>

<p><b>Guests:</b> <span id="rGuests"></span></p>

<p><b>Payment:</b> ✅ Successful</p>

<button onclick="window.print()">🖨 Print Receipt</button>

<br><br>

<a href="index.html">
<button>🏠 Back to Home</button>
</a>

</div>

<script src="receipt.js"></script>

</body>
</html>
